<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echofarmer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <button id="lock-button" class="lock-button">&#128275; Lock</button>
    <button id="view-toggle" class="view-toggle" title="Toggle 3D room / flat view">Flat</button>
    <div id="drive-knob" class="knob" title="Drive" role="slider" aria-label="Drive" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" tabindex="0">
        <div class="knob-dial"><div class="knob-indicator"></div></div>
        <div class="knob-label">Drive</div>
    </div>

    <div id="frame-wrapper">
        <div id="frame-inner">
            <canvas id="header-canvas" class="header-canvas"></canvas>
            <div id="table-scroll">
                <div id="table-content">
                    <canvas id="grid-canvas"></canvas>
                    <div id="gif-container"></div>
                    <div class="links-section">
                        <div class="social-group">
                            <a class="icon-link" href="https://instagram.com/echofarmer" target="_blank" aria-label="Instagram"><img src="icons/SVG/instagram.svg" alt="Instagram"></a>
                            <a class="icon-link" href="https://facebook.com/echofarmer" target="_blank" aria-label="Facebook"><img src="icons/SVG/facebook.svg" alt="Facebook"></a>
                            <a class="icon-link" href="https://youtube.com/@echofarmer" target="_blank" aria-label="YouTube"><img src="icons/SVG/youtube.svg" alt="YouTube"></a>
                            <a class="icon-link" href="https://tiktok.com/@echofarmer" target="_blank" aria-label="TikTok"><img src="icons/SVG/tiktok.svg" alt="TikTok"></a>
                            <a class="icon-link" href="https://linktr.ee/echofarmer" target="_blank" aria-label="Linktree"><img src="icons/SVG/linktree.svg" alt="Linktree"></a>
                        </div>
                        <div class="music-group">
                            <a class="icon-link" href="https://echofarmer.bandcamp.com" target="_blank" aria-label="Bandcamp"><img src="icons/SVG/bandcamp.svg" alt="Bandcamp"></a>
                            <a class="icon-link" href="https://music.apple.com/artist/echofarmer" target="_blank" aria-label="Apple Music"><img src="icons/SVG/apple-music.svg" alt="Apple Music"></a>
                            <a class="icon-link" href="https://open.spotify.com/artist/echofarmer" target="_blank" aria-label="Spotify"><img src="icons/SVG/spotify.svg" alt="Spotify"></a>
                            <a class="icon-link" href="https://tidal.com/artist/echofarmer" target="_blank" aria-label="Tidal"><img src="icons/SVG/tidal.svg" alt="Tidal"></a>
                            <a class="icon-link" href="https://soundcloud.com/echofarmer" target="_blank" aria-label="SoundCloud"><img src="icons/SVG/soundcloud.svg" alt="SoundCloud"></a>
                        </div>
                    </div>
                </div>
            </div>
            <div class="room-walls">
                <div class="wall wall-back"></div>
                <div class="wall wall-floor"></div>
                <div class="wall wall-ceiling"></div>
                <div class="wall wall-left"></div>
                <div class="wall wall-right"></div>
            </div>
        </div>
        <div id="custom-scrollbar"><div id="custom-scrollbar-thumb"></div></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
